syntax = "proto3";

package com.pd.im.codec.proto;

option java_package = "com.pd.im.codec.proto.generated";
option java_multiple_files = true;
option java_outer_classname = "ImMessageProto";

// 用户登录
message LoginPack {
    string userId = 1;
    string ticket = 2;
}

// 登录响应
message LoginAckPack {
    string userId = 1;
}

// 消息体
message ChatMessagePack {
    string messageId = 1;
    string fromId = 2;
    string toId = 3;
    string messageBody = 4;
    int64 messageTime = 5;
    int32 messageType = 6;
    int32 appId = 7;
    int32 clientType = 8;
    string imei = 9;
}

// 消息确认
message ChatMessageAck {
    string messageId = 1;
    int64 messageSequence = 2;
}

// 消息送达确认
message MessageReceiveServerAckPack {
    string messageId = 1;
    int64 serverTime = 2;
}

// 消息已读确认
message MessageReadPack {
    string fromId = 1;
    string toId = 2;
    int64 messageSequence = 3;
    int32 appId = 4;
}

// 撤回消息通知
message RecallMessageNotifyPack {
    string fromId = 1;
    string toId = 2;
    string messageId = 3;
    int32 appId = 4;
}

// 用户资料快照
message UserSnapshotPack {
    string nickName = 1;
    string faceUrl = 2;
    int32 gender = 3;
}

// 好友申请通知包（统一模型）
message FriendRequestPack {
    int64 id = 1;
    string fromId = 2;
    string toId = 3;
    string addSource = 4;
    string addWording = 5;
    int32 approveStatus = 6;
    int64 createTime = 7;
    int64 updateTime = 8;
    int64 sequence = 9;
    UserSnapshotPack userProfile = 10;
}


// 好友信息通知 (对应 3000)
message FriendInfoPack {
    int32 appId = 1;
    string fromId = 2;
    string toId = 3;
    string remark = 4;
    int32 status = 5;
    int32 black = 6;
    int64 createTime = 7;
    int64 friendSequence = 8;
    int64 blackSequence = 9;
    string addSource = 10;
    string extra = 11;
    UserSnapshotPack userProfile = 12;
}

// 删除好友通知 (对应 3002)
message DeleteFriendPack {
    string fromId = 1;
    string toId = 2;
    int64 sequence = 3;
}

// 已读所有好友申请通知
message ReadAllFriendRequestPack {
    string fromId = 1;
    int64 sequence = 2;
}
